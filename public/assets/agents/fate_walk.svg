  <g transform="translate(256,0)"><ellipse cx="32" cy="32" rx="14" ry="22" fill="url(#bodyGrad)"/><circle cx="32" cy="30" r="8" fill="url(#visorGrad)" filter="url(#glow)"/></g>
  <g transform="translate(320,0)"><ellipse cx="32" cy="33" rx="13" ry="23" fill="url(#bodyGrad)"/><circle cx="32" cy="31" r="7.5" fill="url(#visorGrad)" filter="url(#glow)"/></g>
  <g transform="translate(384,0)"><ellipse cx="32" cy="34" rx="12" ry="24" fill="url(#bodyGrad)"/><circle cx="32" cy="32" r="7" fill="url(#visorGrad)" filter="url(#glow)"/></g>
