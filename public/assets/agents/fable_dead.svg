<svg width="64" height="64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="1" dy="2" stdDeviation="1.5" flood-opacity="0.4"/></filter>
  </defs>
  <g filter="url(#shadow)">
    <ellipse cx="32" cy="32" rx="18" ry="12" fill="#3e2723" opacity="0.8" transform="rotate(45, 32, 32)"/> <!-- Fallen vest -->
    <circle cx="28" cy="28" r="10" fill="#922b21" stroke="#1a1a1a" stroke-width="1"/> <!-- Fallen helmet -->
    <rect x="40" y="35" width="20" height="5" fill="#1a1a1a" transform="rotate(-20, 40, 35)"/> <!-- Dropped weapon -->
    <rect x="20" y="45" width="4" height="8" fill="#5d4037" transform="rotate(70, 20, 45)"/> <!-- Empty mag -->
  </g>
</svg>
