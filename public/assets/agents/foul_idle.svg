<svg width="256" height="64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="1" dy="2" stdDeviation="1.5" flood-opacity="0.4"/></filter>
    <radialGradient id="helmetGrad" cx="40%" cy="40%" r="60%"><stop offset="0%" stop-color="#2ecc71"/><stop offset="100%" stop-color="#1e8449"/></radialGradient>
    <radialGradient id="vestGrad" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#1b4f72"/><stop offset="100%" stop-color="#154360"/></radialGradient>
  </defs>
  <g transform="translate(0,0)" filter="url(#shadow)">
