    <circle cx="32" cy="31.5" r="16.5" fill="url(#helmetGrad)" stroke="#1a1a1a" stroke-width="2"/>
    <rect x="43" y="24" width="24" height="12" fill="#333" rx="2"/>
  </g>
  <g transform="translate(128,0)" filter="url(#shadow)">
