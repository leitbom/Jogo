    <circle cx="32" cy="31" r="16" fill="url(#helmetGrad)" stroke="#1a1a1a" stroke-width="2"/>
    <rect x="28" y="22" width="8" height="3" fill="#333" rx="1"/>
    <rect x="42" y="24" width="24" height="12" fill="#333" rx="2"/> <!-- Minigun base -->
  </g>
  <g transform="translate(64,0)" filter="url(#shadow)">
