    <circle cx="32" cy="31" r="16" fill="url(#helmetGrad)" stroke="#1a1a1a" stroke-width="2"/>
    <rect x="42" y="24" width="24" height="12" fill="#333" rx="2"/>
  </g>
  <g transform="translate(192,0)" filter="url(#shadow)">
    <ellipse cx="32" cy="32" rx="19.5" ry="23.5" fill="url(#vestGrad)" />
    <circle cx="32" cy="30.5" r="15.5" fill="url(#helmetGrad)" stroke="#1a1a1a" stroke-width="2"/>
