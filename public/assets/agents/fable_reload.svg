<svg width="512" height="64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="1" dy="2" stdDeviation="1.5" flood-opacity="0.4"/></filter>
    <radialGradient id="helmetGrad" cx="40%" cy="40%" r="60%"><stop offset="0%" stop-color="#e74c3c"/><stop offset="100%" stop-color="#922b21"/></radialGradient>
    <radialGradient id="vestGrad" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#5d4037"/><stop offset="100%" stop-color="#3e2723"/></radialGradient>
  </defs>
  <!-- Reload: Arms moving inwards, weapon tilting -->
  <g transform="translate(0,0)" filter="url(#shadow)">
    <ellipse cx="32" cy="32" rx="16" ry="22" fill="url(#vestGrad)" />
    <circle cx="32" cy="31" r="14" fill="url(#helmetGrad)" stroke="#1a1a1a" stroke-width="1.5"/>
    <rect x="42" y="27" width="22" height="6" fill="#1a1a1a" rx="1"/>
  </g>
  <g transform="translate(64,0)" filter="url(#shadow)">
    <ellipse cx="32" cy="32" rx="17" ry="23" fill="url(#vestGrad)" />
    <circle cx="32" cy="31" r="14" fill="url(#helmetGrad)" stroke="#1a1a1a" stroke-width="1.5"/>
    <rect x="38" y="22" width="20" height="6" fill="#1a1a1a" rx="1" transform="rotate(-15, 38, 22)"/>
    <rect x="25" y="20" width="6" height="10" fill="#333" rx="1"/> <!-- Arms moving in -->
  </g>
  <g transform="translate(128,0)" filter="url(#shadow)">
    <ellipse cx="32" cy="32" rx="18" ry="22" fill="url(#vestGrad)" />
    <circle cx="32" cy="31" r="14" fill="url(#helmetGrad)" stroke="#1a1a1a" stroke-width="1.5"/>
    <rect x="34" y="18" width="20" height="6" fill="#1a1a1a" rx="1" transform="rotate(-30, 34, 18)"/>
    <rect x="22" y="18" width="8" height="10" fill="#333" rx="1"/>
  </g>
  <g transform="translate(192,0)" filter="url(#shadow)">
    <ellipse cx="32" cy="32" rx="17" ry="23" fill="url(#vestGrad)" />
    <circle cx="32" cy="31" r="14" fill="url(#helmetGrad)" stroke="#1a1a1a" stroke-width="1.5"/>
    <rect x="32" y="20" width="20" height="6" fill="#1a1a1a" rx="1" transform="rotate(-20, 32, 20)"/>
    <rect x="40" y="40" width="4" height="8" fill="#5d4037" /> <!-- Magazine being inserted -->
  </g>
  <g transform="translate(256,0)" filter="url(#shadow)">
    <ellipse cx="32" cy="32" rx="16" ry="22" fill="url(#vestGrad)" />
    <circle cx="32" cy="31" r="14" fill="url(#helmetGrad)" stroke="#1a1a1a" stroke-width="1.5"/>
    <rect x="40" y="25" width="22" height="6" fill="#1a1a1a" rx="1" transform="rotate(-5, 40, 25)"/>
  </g>
  <g transform="translate(320,0)" filter="url(#shadow)">
    <ellipse cx="32" cy="32" rx="16" ry="22" fill="url(#vestGrad)" />
    <circle cx="32" cy="31" r="14" fill="url(#helmetGrad)" stroke="#1a1a1a" stroke-width="1.5"/>
    <rect x="42" y="27" width="22" height="6" fill="#1a1a1a" rx="1"/>
  </g>
  <g transform="translate(384,0)" filter="url(#shadow)">
    <ellipse cx="32" cy="32" rx="16" ry="22" fill="url(#vestGrad)" />
    <circle cx="32" cy="31" r="14" fill="url(#helmetGrad)" stroke="#1a1a1a" stroke-width="1.5"/>
    <rect x="42" y="27" width="22" height="6" fill="#1a1a1a" rx="1"/>
  </g>
  <g transform="translate(448,0)" filter="url(#shadow)">
    <ellipse cx="32" cy="32" rx="16" ry="22" fill="url(#vestGrad)" />
    <circle cx="32" cy="31" r="14" fill="url(#helmetGrad)" stroke="#1a1a1a" stroke-width="1.5"/>
    <rect x="42" y="27" width="22" height="6" fill="#1a1a1a" rx="1"/>
  </g>
</svg>
