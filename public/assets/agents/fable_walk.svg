<svg width="512" height="64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="1" dy="2" stdDeviation="1.5" flood-opacity="0.4"/></filter>
    <radialGradient id="helmetGrad" cx="40%" cy="40%" r="60%"><stop offset="0%" stop-color="#e74c3c"/><stop offset="100%" stop-color="#922b21"/></radialGradient>
    <radialGradient id="vestGrad" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#5d4037"/><stop offset="100%" stop-color="#3e2723"/></radialGradient>
  </defs>
  <!-- 8 Frames of walking with shoulder sway -->
  <g transform="translate(0,0)" filter="url(#shadow)">
    <ellipse cx="32" cy="32" rx="17" ry="23" fill="url(#vestGrad)" />
    <circle cx="32" cy="31" r="14" fill="url(#helmetGrad)" stroke="#1a1a1a" stroke-width="1.5"/>
    <rect x="42" y="26" width="22" height="7" fill="#1a1a1a" rx="1"/>
  </g>
  <g transform="translate(64,0)" filter="url(#shadow)">
    <ellipse cx="33" cy="31" rx="18" ry="22" fill="url(#vestGrad)" transform="rotate(5, 33, 31)"/>
    <circle cx="33" cy="30" r="14" fill="url(#helmetGrad)" stroke="#1a1a1a" stroke-width="1.5"/>
    <rect x="43" y="25" width="22" height="7" fill="#1a1a1a" rx="1" transform="rotate(5, 43, 25)"/>
  </g>
  <g transform="translate(128,0)" filter="url(#shadow)">
    <ellipse cx="32" cy="30" rx="16" ry="24" fill="url(#vestGrad)" />
    <circle cx="32" cy="29" r="14" fill="url(#helmetGrad)" stroke="#1a1a1a" stroke-width="1.5"/>
    <rect x="42" y="24" width="22" height="7" fill="#1a1a1a" rx="1"/>
  </g>
  <g transform="translate(192,0)" filter="url(#shadow)">
    <ellipse cx="31" cy="31" rx="18" ry="22" fill="url(#vestGrad)" transform="rotate(-5, 31, 31)"/>
    <circle cx="31" cy="30" r="14" fill="url(#helmetGrad)" stroke="#1a1a1a" stroke-width="1.5"/>
    <rect x="41" y="25" width="22" height="7" fill="#1a1a1a" rx="1" transform="rotate(-5, 41, 25)"/>
  </g>
  <g transform="translate(256,0)" filter="url(#shadow)">
    <ellipse cx="32" cy="32" rx="17" ry="23" fill="url(#vestGrad)" />
    <circle cx="32" cy="31" r="14" fill="url(#helmetGrad)" stroke="#1a1a1a" stroke-width="1.5"/>
    <rect x="42" y="26" width="22" height="7" fill="#1a1a1a" rx="1"/>
  </g>
  <g transform="translate(320,0)" filter="url(#shadow)">
    <ellipse cx="33" cy="33" rx="18" ry="22" fill="url(#vestGrad)" transform="rotate(5, 33, 33)"/>
    <circle cx="33" cy="32" r="14" fill="url(#helmetGrad)" stroke="#1a1a1a" stroke-width="1.5"/>
    <rect x="43" y="27" width="22" height="7" fill="#1a1a1a" rx="1" transform="rotate(5, 43, 27)"/>
  </g>
  <g transform="translate(384,0)" filter="url(#shadow)">
    <ellipse cx="32" cy="34" rx="16" ry="24" fill="url(#vestGrad)" />
    <circle cx="32" cy="33" r="14" fill="url(#helmetGrad)" stroke="#1a1a1a" stroke-width="1.5"/>
    <rect x="42" y="28" width="22" height="7" fill="#1a1a1a" rx="1"/>
  </g>
  <g transform="translate(448,0)" filter="url(#shadow)">
    <ellipse cx="31" cy="33" rx="18" ry="22" fill="url(#vestGrad)" transform="rotate(-5, 31, 33)"/>
    <circle cx="31" cy="32" r="14" fill="url(#helmetGrad)" stroke="#1a1a1a" stroke-width="1.5"/>
    <rect x="41" y="27" width="22" height="7" fill="#1a1a1a" rx="1" transform="rotate(-5, 41, 27)"/>
